# ==========================================================
# Mihomo Android 审计修正版 V5
# 结论依据：规则模式阻断 UDP/443 时 Gemini/Play App 失败；切换全局模式后可用。
# V5 恢复 QUIC/HTTP3，并补充机场配置中的 Gemini Android 后端域名。
# ==========================================================

mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 15
disable-keep-alive: false
external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# TUN：恢复 UDP/QUIC，并启用 endpoint-independent-nat 改善移动 App 的 UDP 映射兼容性。
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: true
  dns-hijack:
    - any:53
    - tcp://any:53

# DNS：沿用 V4 已验证可用的直连加密 DoH + Fake-IP。
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  cache-algorithm: arc
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost
    - "+.localdomain"
    - "+.home.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "time.*.edu.cn"
    - "*.time.edu.cn"
  use-hosts: true
  use-system-hosts: true
  # default-nameserver字段用于解析DOH地址，如：
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 直接使用下面的DOH解析命中geosite:gfw的域名
  nameserver-policy:
    "geosite:gfw":
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  # 用于解析实际访问网站的域名
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # proxy-server-nameserver用来解析节点中配置文件的域名
  proxy-server-nameserver:
     - 1.1.1.1
     - 119.29.29.29
    #- https://1.1.1.1/dns-query  
    #- https://dns.google/dns-query
  # nameserver解析失败时使用fallback的DNS列表进行解析
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
  # 判断解析后的IP是否在海外，在海外的IP使用fallback的解析结果，国内的用nameserver解析结果
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32

# 请把真实节点粘贴到这里。
proxies:


proxy-groups:
  - name: Proxy
    type: select
    include-all: true
    proxies:
      - DIRECT  # 导入节点后务必选择真实节点；稳定后可删除 DIRECT。
  - name: Auto
    type: fallback
    include-all: true
    proxies:
  - name: "速度最优"
    type: url-test
    interval: 600
    expected-status: 204
    lazy: true
    include-all: true
    proxies:
      
rule-providers:
  google:
    type: http
    behavior: domain
    format: mrs
    path: ./rules/google.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs
    interval: 86400
    proxy: Proxy
  anthropic:
    type: http
    behavior: domain
    format: mrs
    path: ./rules/anthropic.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/anthropic.mrs
    interval: 86400
    proxy: Proxy
  telegram:
    type: http
    behavior: domain
    format: mrs
    path: ./rules/telegram.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs
    interval: 86400
    proxy: Proxy
  grok:
    type: http
    behavior: domain
    format: mrs
    path: ./rules/grok.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/xai.mrs
    interval: 86400
    proxy: Proxy
  microsoft-cn:
    type: http
    behavior: domain
    format: mrs
    path: ./rules/microsoft@cn.mrs
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft@cn.mrs
    interval: 86400
    proxy: Proxy

